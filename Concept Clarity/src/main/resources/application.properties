spring.application.name=concept-clarity
server.port=${SERVER_PORT:8081}

# This connects to your existing MySQL Workbench schema: concept clarity
# The space is written as %20 because JDBC URLs should be URL-safe.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/concept%20clarity?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ajay.1@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# This creates/updates only the table inside your existing `concept clarity` schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# OpenAI runs only on the backend. Set OPENAI_API_KEY in your environment.
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
