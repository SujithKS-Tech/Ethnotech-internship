<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img
      class="top-image"
      src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=900&q=80"
      alt="Healthy food bowl with fruits and grains"
    >

    <h1>BMI Calculator</h1>
    <p class="subtitle">Check your Body Mass Index quickly.</p>

    <form id="bmiForm">
      <label for="height">Height (cm)</label>
      <input type="number" id="height" placeholder="Enter your height">

      <label for="weight">Weight (kg)</label>
      <input type="number" id="weight" placeholder="Enter your weight">

      <button type="submit">Calculate BMI</button>
    </form>

    <div id="result" class="result-box" aria-live="polite"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
